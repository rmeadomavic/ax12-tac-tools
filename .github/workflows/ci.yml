name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lua5.3 shellcheck

      - name: Python syntax
        run: find . -name '*.py' -not -path './.git/*' -print0 | xargs -0 python3 -m py_compile

      - name: tools.json valid JSON
        run: python3 -c "import json; json.load(open('tools.json'))"

      - name: Launcher/config consistency
        run: python3 scripts/check_launcher_consistency.py

      - name: Lua syntax
        run: find lua -name '*.lua' -print0 | xargs -0 -n1 luac -p

      - name: Shell scripts
        run: shellcheck -S error install.sh shortcuts/*.sh
